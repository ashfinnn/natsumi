// Music controller: uses local file "bgm.mp3" in same directory. Renge toggles.
function useBackgroundMusic() {
    const audioRef = useRef(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [ready, setReady] = useState(false);

    useEffect(() => {
        // create audio element with bgm.mp3
        const audio = new Audio('./bgm.mp3');
        audio.loop = true;
        audio.preload = 'auto';
        audioRef.current = audio;

        const handleCanPlay = () => setReady(true);
        audio.addEventListener('canplaythrough', handleCanPlay);
        // autoplay attempt (muted first to bypass policy, then unmute on user gesture)
        audio.muted = true;
        audio.play().then(() => {
            // after first successful muted play, we keep muted until first Renge click.
            // we'll unmute when user clicks on Renge to start actual music.
            audio.muted = true; // still muted, we'll unmute on first interaction
            setIsPlaying(false);
        }).catch(e => console.log("autoplay blocked, will start on renge click"));

        return () => {
            audio.pause();
            audio.src = '';
            audio.removeEventListener('canplaythrough', handleCanPlay);
        };
    }, []);

    const startMusic = useCallback(() => {
        if (!audioRef.current) return;
        audioRef.current.muted = false;
        audioRef.current.play().then(() => {
            setIsPlaying(true);
        }).catch(e => console.log("play failed", e));
    }, []);

    const togglePlayPause = useCallback(() => {
        if (!audioRef.current) return;
        // if audio not started or still muted, force start
        if (audioRef.current.paused || audioRef.current.muted) {
            audioRef.current.muted = false;
            audioRef.current.play().then(() => setIsPlaying(true)).catch(e=>console.log);
        } else {
            // pause
            audioRef.current.pause();
            setIsPlaying(false);
        }
    }, []);

    const resumeIfNeeded = useCallback(() => {
        if (audioRef.current && audioRef.current.paused && !audioRef.current.muted) {
            audioRef.current.play().catch(e=>console.log);
            setIsPlaying(true);
        }
    }, []);

    return { audioRef, isPlaying, startMusic, togglePlayPause, resumeIfNeeded };
}

// Character stickers component (floating images)
function FloatingCharacters({ onRengeMusicToggle, musicPlaying }) {
    const [activeQuote, setActiveQuote] = useState(null);
    const [activeCharId, setActiveCharId] = useState(null);
    let timer = useRef(null);

    const handleInteract = (char) => {
        if (timer.current) clearTimeout(timer.current);
        const randomIdx = Math.floor(Math.random() * char.quotes.length);
        setActiveQuote(char.quotes[randomIdx]);
        setActiveCharId(char.id);
        timer.current = setTimeout(() => {
            setActiveQuote(null);
            setActiveCharId(null);
        }, 2200);
        
        // special: if character is Renge, toggle music
        if (char.id === 'renge') {
            onRengeMusicToggle();
        }
    };

    return (
        <>
            {STICKER_CHARS.map((char) => {
                let positionClass = '';
                if (char.id === 'renge') positionClass = 'sticker-renge';
                if (char.id === 'komari') positionClass = 'sticker-komari';
                if (char.id === 'natsumi') positionClass = 'sticker-natsumi';
                if (char.id === 'hotaru') positionClass = 'sticker-hotaru';
                return (
                    <div key={char.id}
                         className={`character-sticker ${positionClass} bg-white/80 border-2 border-amber-300 shadow-md`}
                         onClick={() => handleInteract(char)}
                         onMouseEnter={() => handleInteract(char)}
                    >
                        <img 
                            src={char.imgSrc} 
                            alt={char.name}
                            className="sticker-avatar-img"
                            onError={(e) => { e.target.onerror = null; e.target.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23fbe5bf'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='28'%3E${char.fallbackEmoji}%3C/text%3E%3C/svg%3E`; }}

                        <div className="sticker-name">{char.name}</div>
                        {char.id === 'renge' && (
                            <div className="music-icon-overlay">

                        )}

                            <div className="speech-bubble-sticker">
                                💬 {activeQuote}
                            </div>
                        )}
                    </div>
                );
            })}
        </>
    );
}

// ---------- MAIN APP ----------
function App() {
    const loadWatched = () => { try { return new Set(JSON.parse(localStorage.getItem('nnb_watched')) || []); } catch(e) { return new Set(); } };
    const loadHistory = () => { try { return JSON.parse(localStorage.getItem('nnb_history')) || []; } catch(e) { return []; } };
    const [watchedIds, setWatchedIds] = useState(loadWatched);
    const [history, setHistory] = useState(loadHistory);
    const [filterSeason, setFilterSeason] = useState('All');
    const [searchTerm, setSearchTerm] = useState('');

    const [isPicking, setIsPicking] = useState(false);
    const [showStats, setShowStats] = useState(false);
    const { isPlaying, togglePlayPause, startMusic, resumeIfNeeded } = useBackgroundMusic();

    // sync music status display
    useEffect(() => {
        const statusDiv = document.getElementById('musicStatusDisplay');
        if (statusDiv) {
            statusDiv.innerHTML = isPlaying ? '♪ bgm playing ♪ (click Renge to pause)' : '⏸ bgm paused (click Renge to play)';
        }
    }, [isPlaying]);

    // attempt to start music on first user click anywhere? But we will tie only to Renge. To make it "running by default" possible, we call startMusic after user clicks Renge.
    // We'll also try to resume if needed.
    const handleRengeMusicToggle = () => {
        // if audio not yet started (muted or not playing), startMusic will unmute and play
        // otherwise togglePlayPause will pause/resume
        if (!isPlaying && !window._musicStarted) {
            startMusic();
            window._musicStarted = true;
        } else {
            togglePlayPause();
        }
    };

    useEffect(() => {
        localStorage.setItem('nnb_watched', JSON.stringify([...watchedIds]));
    }, [watchedIds]);
    useEffect(() => {
        localStorage.setItem('nnb_history', JSON.stringify(history.slice(0, 50)));
    }, [history]);

    const addHistory = (action, id) => setHistory(prev => [{ id, action, ts: Date.now() }, ...prev].slice(0, 40));

    const toggleWatched = useCallback((id) => {
        setWatchedIds(prev => {
            const newSet = new Set(prev);
            if (newSet.has(id)) { newSet.delete(id); addHistory('unmarked', id); }
            else { newSet.add(id); addHistory('marked', id); }
            return newSet;
        });
        if (pickedEpisode?.id === id) setPickedEpisode(null);
    }, [pickedEpisode]);

    const { watched, unwatched } = useMemo(() => {
        let w = [], uw = [];
        EPISODES.forEach(ep => (watchedIds.has(ep.id) ? w : uw).push(ep));
        return { watched: w, unwatched: uw };
    }, [watchedIds]);

    const filterList = (list) => {
        let filtered = filterSeason === 'All' ? list : list.filter(ep => ep.season === filterSeason);
        if (searchTerm.trim()) {
            const q = searchTerm.toLowerCase();
            filtered = filtered.filter(ep => ep.title.toLowerCase().includes(q) || ep.tags.some(t => t.includes(q)));
        }
        return filtered;
    };
    const filteredUnwatched = useMemo(() => filterList(unwatched), [unwatched, filterSeason, searchTerm]);
    const filteredWatched = useMemo(() => filterList(watched), [watched, filterSeason, searchTerm]);

    const pickEpisode = useCallback((pool) => {
        if (!pool.length) return;
        setIsPicking(true);
        setPickedEpisode(null);
        setTimeout(() => {
            const randomEp = pool[Math.floor(Math.random() * pool.length)];
            setPickedEpisode(randomEp);
            addHistory('picked', randomEp.id);
            setIsPicking(false);
        }, 500);
    }, []);

    const finishPicked = () => { if(pickedEpisode) { toggleWatched(pickedEpisode.id); setPickedEpisode(null); } };
    const resetAll = () => { if(confirm("🌸 Restart your diary? All progress will fade like morning mist.")) { setWatchedIds(new Set()); setHistory([]); setPickedEpisode(null); setFilterSeason('All'); setSearchTerm(''); } };

    const stats = useMemo(() => {
        const bySeasons = {};
        Object.keys(SEASON_META).forEach(s => {
            const total = EPISODES.filter(ep => ep.season === s).length;
            const w = watched.filter(ep => ep.season === s).length;
            bySeasons[s] = { total, watched: w, pct: total ? (w/total)*100 : 0 };
        });
        return { total: EPISODES.length, watched: watched.length, pct: (watched.length/EPISODES.length)*100, bySeasons, recentHistory: history.slice(0,6) };
    }, [watched, history]);

    const epCountMap = useMemo(() => {
        let map = { All: EPISODES.length };
        Object.keys(SEASON_META).forEach(s => map[s] = EPISODES.filter(ep => ep.season === s).length);
        return map;
    }, []);

    const milestone = [25, 50, 75, 100].find(m => stats.pct >= m && stats.pct < m+4.5);

    return (
        <div className="main-board">
            <FloatingCharacters onRengeMusicToggle={handleRengeMusicToggle} musicPlaying={isPlaying} />

            {/* header diary */}
            <div className="flex justify-center -mb-3"><div className="tape-strip w-36 h-5"></div></div>
            <div className="bg-[#fffef5] border-2 border-amber-200 rounded-3xl shadow-2xl p-5 md:p-7 relative transform rotate-[0.2deg]">
                <div className="pin pin-left"></div><div className="pin pin-right"></div>
                <div className="stamp-circle absolute top-3 right-3 w-16 h-16 flex flex-col items-center justify-center text-[10px] font-bold text-amber-800 border-2 border-amber-600 rounded-full bg-amber-50/70"><span>🐾</span>NYANPASU</div>
                <h1 className="font-['Yuji_Syuku'] text-4xl md:text-5xl text-stone-800">のんのんびより</h1>
                <p className="text-stone-500 text-sm mt-1 flex items-center gap-2">🌾 Episode Diary · Asahigaoka Village 🌾</p>

                <div className="flex flex-wrap gap-3 items-center mt-5">
                    <div className="relative flex-1">
                        <input type="text" placeholder="🔎 search by title or tag (rice, summer, ...)" className="w-full bg-amber-50/60 border border-amber-300 rounded-full py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                        {searchTerm && <button onClick={()=>setSearchTerm('')} className="absolute right-3 top-2 text-stone-400">✕</button>}
                    </div>
                    <button onClick={()=>setShowStats(!showStats)} className="bg-white/80 border border-amber-300 px-4 py-2 rounded-full text-sm shadow-sm hover:bg-amber-50">📖 {showStats ? 'Hide Diary' : 'Show Stats'}</button>
                </div>
                {showStats && <StatsPanel stats={stats} onClose={()=>setShowStats(false)} />}
            </div>

            {/* picker card */}
            <div className="mt-7 bg-[#f6f9ec] border-l-8 border-green-600 rounded-2xl shadow-lg p-5 relative">
                <div className="absolute -top-2 left-6 w-16 h-3 bg-[#eedfa8] rounded-full opacity-80"></div>
                <div className="flex flex-wrap gap-2 mb-4">
                    {SEASON_FILTERS.map(s => (
                        <button key={s} onClick={()=>setFilterSeason(s)} className={`text-xs md:text-sm px-4 py-1.5 rounded-full transition-all ${filterSeason === s ? 'bg-green-700 text-white shadow-md' : 'bg-white/80 text-stone-700 border border-amber-300 hover:bg-amber-100'}`}>
                            {s === 'All' ? '🍃 All' : SEASON_META[s]?.label} <span className="opacity-70 text-[10px]">({epCountMap[s]})</span>
                        </button>
                    ))}
                </div>
                <div className="flex flex-wrap gap-4 items-center">
                    <button disabled={!filteredUnwatched.length || isPicking} onClick={()=>pickEpisode(filteredUnwatched)} className="bg-green-800 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow-lg disabled:opacity-50 transition flex gap-2 items-center btn-hand">
                        {isPicking ? <span className="picking-spin">🌀</span> : '🌾'} {isPicking ? 'Finding episode...' : 'Pick Unwatched'}
                    </button>
                    <button disabled={isPicking} onClick={()=>pickEpisode(EPISODES)} className="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-6 rounded-full shadow-md flex gap-2 items-center btn-hand">✨ Surprise Me ✨</button>
                </div>

                {pickedEpisode && (
                    <div className="mt-5 bg-white rounded-2xl border border-amber-200 p-4 shadow-inner relative animate-fadeIn">
                        <div className="absolute -top-3 left-6 w-12 h-3 bg-[#e7dbbc] rounded-full opacity-70"></div>
                        <div className="text-xs text-amber-700 tracking-wider">🎋 TODAY'S EPISODE</div>
                        <div className="font-['Yuji_Syuku'] text-xl md:text-2xl text-stone-800">{pickedEpisode.title}</div>
                        <div className="flex flex-wrap gap-2 mt-2 text-xs">
                            <span className="bg-stone-100 px-3 py-0.5 rounded-full">{epDisplay(pickedEpisode)}</span>
                            <span className="bg-amber-100 px-3 py-0.5 rounded-full">{SEASON_META[pickedEpisode.season]?.emoji} {SEASON_META[pickedEpisode.season]?.label}</span>
                            {pickedEpisode.tags.map(t => <span key={t} className="bg-green-50 px-2 py-0.5 rounded-full text-stone-600">#{t}</span>)}
                        </div>
                        <div className="flex gap-3 mt-4">
                            <button onClick={finishPicked} className="bg-amber-800 hover:bg-amber-700 text-white px-5 py-1.5 rounded-full text-sm shadow-md btn-hand">✓ Watched it!</button>
                            <button onClick={()=>pickEpisode(filteredUnwatched)} disabled={!filteredUnwatched.length} className="border border-stone-300 px-5 py-1.5 rounded-full text-sm">⟳ Pick again</button>
                        </div>
                    </div>
                )}
            </div>

            {/* progress bar */}
            <div className="mt-6 bg-[#ecf3e5] rounded-2xl p-4 border-r-8 border-sky-400 shadow">
                <div className="flex justify-between text-sm font-medium"><span>🌱 Journey progress</span><span>{stats.watched}/{stats.total} episodes</span></div>
                <div className="w-full h-4 bg-stone-200 rounded-full mt-2 overflow-hidden"><div className="progress-fill-hand" style={{width: `${stats.pct}%`}}/></div>
                {milestone && <div className="mt-2 text-xs text-emerald-700 bg-white/60 rounded-full px-3 py-1 inline-block">{milestone === 100 ? '🏆 Full completion! Nyanpasu~ 🏆' : `✨ ${milestone}% — the village feels like home`}</div>}
            </div>

            {/* episode lists */}
            <div className="grid md:grid-cols-2 gap-5 mt-6">
                <div className="bg-white/80 rounded-2xl shadow p-3 border border-amber-100">
                    <h3 className="font-bold text-stone-700 mb-2 pl-2 border-l-4 border-green-500">🍃 Unwatched ({filteredUnwatched.length})</h3>
                    <EpisodeList episodes={filteredUnwatched} onToggle={toggleWatched} isWatchedList={false} />
                </div>
                <div className="bg-white/80 rounded-2xl shadow p-3 border border-amber-100">
                    <h3 className="font-bold text-stone-700 mb-2 pl-2 border-l-4 border-amber-500">📖 Watched ({filteredWatched.length})</h3>
                    <EpisodeList episodes={filteredWatched} onToggle={toggleWatched} isWatchedList={true} />
                </div>
            </div>

            <div className="mt-5 flex justify-center">
                <button onClick={resetAll} className="bg-stone-200 hover:bg-stone-300 text-stone-700 px-5 py-2 rounded-full text-sm shadow flex gap-1 items-center btn-hand">↺ Reset Diary</button>
            </div>
            <div className="text-center text-[11px] text-stone-400 mt-6">✿  every day in asahigaoka is a little treasure · nyanpasu  ✿</div>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
